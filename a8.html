<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>今天想完成的事？互動遊戲 - 出門</title>
<link rel="stylesheet" href="game.css">
<script src="libs/tailwind.min.js"></script>
</head>
<body>
  <div id="gameContainer" class="w-[95%] max-w-[1400px] mx-auto my-[42px] p-[33px] relative transition-opacity duration-500">
    <div class="flex flex-col gap-[21px]">
      <div class="flex items-end gap-10">
        <h1>出門</h1>
        <p class="description">點一下圖就會自動跑到順序格子裡</p>
      </div>
      <div class="flex flex-col gap-[18px] items-start mt-1.5" id="dropZone"></div>
      <div class="flex flex-nowrap gap-[18px] justify-center mt-1.5" id="stepList"></div>
    </div>
    <div id="timer" class="timer" hidden>耗用時間：00:00.00</div>
    <aside class="sidebar" id="sidebar"></aside>
    <div id="congrats">恭喜完成！</div>
    <canvas class="confetti-canvas" id="confetti-canvas"></canvas>
    <audio id="bgm" src="back.mp3" loop preload="auto" playsinline></audio>
    <audio id="sndError" src="error.wav" preload="auto" playsinline></audio>
    <audio id="sndSuccess" src="success.wav" preload="auto" playsinline></audio>
    <div class="intro enter" id="intro">
      <div class="w-[min(1100px,92%)] px-12 py-11 bg-[rgba(255,245,220,0.98)] rounded-[28px] shadow-[0_10px_28px_rgba(0,0,0,0.25),inset_0_0_0_8px_rgba(255,255,255,0.85)] text-center">
        <h2 class="intro-title m-0 mb-[22px] text-[112px] leading-none text-[#c85a00]" id="introTitle"></h2>
        <ul class="intro-lines m-0 p-0 list-none text-[#c62828] font-extrabold leading-snug text-[64px]" id="introLines"></ul>
        <button class="mt-7 text-[36px] font-black tracking-[4px] px-9 py-4 rounded-[18px] border-[6px] border-[var(--accent-dark)] bg-white text-[var(--accent-dark)] cursor-pointer shadow-[3px_3px_12px_rgba(0,0,0,0.25)] hover:scale-105 transition-transform" id="btnStart">開始</button>
      </div>
    </div>
  </div>
<script src="libs/confetti.browser.min.js"></script>
<script>
window.GAME_CONFIG = {
  recipe:    ["拿包包","帶手機","帶錢包","帶藥","拿鑰匙","換鞋子","開門","鎖門"],
  imageMap:  {"拿包包":"a8-1.png","帶手機":"a8-2.png","帶錢包":"a8-3.png","帶藥":"a8-4.png","拿鑰匙":"a8-5.png","換鞋子":"a8-6.png","開門":"a8-7.png","鎖門":"a8-8.png"},
  menuUrl:   'act.html',
  menuLabel: '重選活動'
};
</script>
<script src="game.js"></script>
</body>
</html>
