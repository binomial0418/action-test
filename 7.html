<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>今天吃什麼？互動遊戲 - 煮水餃</title>
<link rel="stylesheet" href="game.css">
<style>
:root{ --accent:#c68642; --title-color:#d2691e; --desc-color:#8b4513; --timer-x:600px; --timer-y:56px; }
@media (max-width:1024px){ :root{ --timer-x:520px; } }
</style>
</head>
<body>
  <div id="gameContainer">
    <div class="board">
      <div class="title-wrap">
        <h1>煮水餃</h1>
        <p class="description">點一下圖就會自動跑到順序格子裡</p>
      </div>
      <div class="drop-rows" id="dropZone"></div>
      <div class="images" id="stepList"></div>
    </div>
    <div id="timer" class="timer" hidden>耗用時間：00:00.00</div>
    <aside class="sidebar" id="sidebar"></aside>
    <div id="congrats">恭喜完成！</div>
    <canvas class="confetti-canvas" id="confetti-canvas"></canvas>
    <audio id="bgm" src="back.mp3" loop preload="auto" playsinline></audio>
    <audio id="sndError" src="error.wav" preload="auto" playsinline></audio>
    <audio id="sndSuccess" src="success.wav" preload="auto" playsinline></audio>
    <div class="intro enter" id="intro">
      <div class="intro-card">
        <h2 class="intro-title" id="introTitle"></h2>
        <ul class="intro-lines" id="introLines"></ul>
        <button class="start-btn" id="btnStart">開始</button>
      </div>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
window.GAME_CONFIG = {
  recipe:    ["放鍋子","鍋子加水","開火","等待水滾","放入水餃","關火","撈出水餃","水餃裝盤"],
  imageMap:  {"放鍋子":"7-1.png","鍋子加水":"7-2.png","開火":"7-3.png","等待水滾":"7-4.png","放入水餃":"7-5.png","關火":"7-6.png","撈出水餃":"7-7-2.png","水餃裝盤":"7-8.png"},
  menuUrl:   'cook.html',
  menuLabel: '重選菜色'
};
</script>
<script src="game.js"></script>
</body>
</html>
