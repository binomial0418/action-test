<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>今天來點什麼～</title>
<script src="libs/tailwind.min.js"></script>
<style>
  body {
    background: url('bg.png') center/cover no-repeat fixed;
    font-family: system-ui,-apple-system,"PingFang TC","Noto Sans TC",sans-serif;
  }
  .wrap::before {
    content: "";
    position: absolute; inset: 0 50% 0 0;
    background: linear-gradient(90deg, rgba(255,238,210,.35), rgba(255,238,210,0));
    pointer-events: none;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 10px 22px rgba(0,0,0,.12); }
    50%  { box-shadow: 0 22px 40px rgba(0,0,0,.22); }
    100% { box-shadow: 0 10px 22px rgba(0,0,0,.12); }
  }
  .card.pulse { animation: pulse 2.5s ease-out 1; }
</style>
</head>
<body class="min-h-screen m-0 text-[#3b220c]">
  <main class="wrap w-[min(95%,1180px)] mx-auto my-12 px-11 py-9 rounded-[28px] bg-[rgba(255,255,255,0.05)] backdrop-blur-sm shadow-[0_30px_80px_-10px_rgba(0,0,0,0.18),0_0_0_1px_rgba(255,255,255,0.35)_inset] relative overflow-hidden">
    <h1 class="m-0 mb-6 leading-none text-[clamp(56px,7.2vw,96px)] tracking-[4px] text-[#5c2e00] [text-shadow:0_4px_0_rgba(0,0,0,0.06),0_18px_40px_rgba(0,0,0,0.18)]">今天來點什麼～</h1>

    <section class="grid grid-cols-2 gap-[38px] items-stretch max-sm:grid-cols-1" aria-label="模式選擇">
      <a class="card left pulse flex items-center justify-center text-center p-12 rounded-3xl no-underline bg-white text-[#3b220c] shadow-[0_10px_22px_rgba(0,0,0,0.12)] transition-[transform,box-shadow] duration-150 border-[5px] border-[#8b4a00] hover:-translate-y-1 hover:shadow-[0_18px_34px_rgba(0,0,0,0.16)]" href="act.html" aria-label="挑戰日常活動">
        <div class="font-extrabold text-[clamp(28px,3.3vw,44px)] tracking-[3px] leading-snug whitespace-nowrap">挑戰<small class="block text-[0.68em] font-bold mt-1 tracking-[2px] opacity-95">日常活動</small></div>
      </a>
      <a class="card right pulse flex items-center justify-center text-center p-12 rounded-3xl no-underline bg-white text-[#3b220c] shadow-[0_10px_22px_rgba(0,0,0,0.12)] transition-[transform,box-shadow] duration-150 border-[5px] border-[#b03a00] hover:-translate-y-1 hover:shadow-[0_18px_34px_rgba(0,0,0,0.16)]" href="cook.html" aria-label="挑戰作菜活動">
        <div class="font-extrabold text-[clamp(28px,3.3vw,44px)] tracking-[3px] leading-snug whitespace-nowrap">挑戰<small class="block text-[0.68em] font-bold mt-1 tracking-[2px] opacity-95">作菜活動</small></div>
      </a>
    </section>
  </main>

  <audio id="bgm" src="back.mp3" loop preload="auto" playsinline></audio>

  <script>
    const bgm = document.getElementById('bgm');
    function tryPlay(){
      if(!bgm) return;
      bgm.volume = 0.55;
      const p = bgm.play();
      if (p && typeof p.then === 'function') {
        p.catch(()=>{
          const resume = () => {
            bgm.play().catch(()=>{});
            document.removeEventListener('click', resume, true);
            document.removeEventListener('touchend', resume, true);
          };
          document.addEventListener('click', resume, true);
          document.addEventListener('touchend', resume, true);
        });
      }
    }
    window.addEventListener('load', tryPlay);
    ['click','keydown','touchend'].forEach(e=>document.addEventListener(e, tryPlay, {once:true, capture:true}));
  </script>
</body>
</html>
